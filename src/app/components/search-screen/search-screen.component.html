<div class="search-screen-cnt">
    <div class="header">
        <mat-form-field class="example-form-field">
            <mat-label>Location</mat-label>
            <input matInput type="text" [(ngModel)]="this.weatherDataService.location">
            <button (click)="searchLocation(this.weatherDataService.location)" matSuffix mat-icon-button aria-label="Clear">
                <mat-icon>search</mat-icon>
            </button>
        </mat-form-field>
    </div>
</div>
