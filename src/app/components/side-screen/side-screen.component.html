<div class="side-screen-cnt">
    <div class="temp-unit-cnt">
        <div (click)="changeUnitToC()" [ngStyle]="{ 'background-color': this.weatherData.unitC ? 'aliceblue' : '', 'color': this.weatherData.unitC ? 'black' : '' }" class="circle">°C</div>
        <div (click)="changeUnitToF()" [ngStyle]="{ 'background-color': this.weatherData.unitF ? 'aliceblue' : '', 'color': this.weatherData.unitF ? 'black' : '' }" class="circle">°F</div>
    </div>

    <div class="forecast-cnt">
        <div class="forecast" *ngFor="let item of this.weatherData?.weatherForecast?.list.slice(0, 5)">
            <div class="time">
                {{ item.dt_txt | date:'HH:mm' }} Uhr
            </div>
            <div class="icon">
                <!-- <img class="weather-img" src="./assets/img/{{item.weather[0].main}}.png" alt=""> -->
                <img class="weather-img" src="https://openweathermap.org/img/wn/{{ item.weather[0].icon }}@2x.png" alt="">
            </div>
            <div class="temp">
                {{ this.roundDecimal(item.main.temp) }}°
            </div>
            
        </div>
    </div>

    <div class="highlights-container">
        <h1 class="header">Today's Highlights</h1>

        <div class="first-row-highlights">
            <div class="highlight">
                <div class="highlight-header">
                    <p>Wind speed</p>
                </div>
                <div class="highlight-information">
                    <p>{{ this.roundDecimal(this.weatherData.myWeather?.wind.speed) }} <span class="unit">kmh</span></p>
                </div>
            </div>
            <div class="highlight"></div>
        </div>
    </div>
</div>
