<div class="side-screen-cnt">
    <div class="temp-unit-cnt">
        <div (click)="changeUnitToC()" [ngStyle]="{ 'background-color': unitC ? '#585676' : '', 'color': unitC ? 'white' : '' }" class="circle">°C</div>
        <div (click)="changeUnitToF()" [ngStyle]="{ 'background-color': unitF ? '#585676' : '', 'color': unitF ? 'white' : '' }" class="circle">°F</div>
    </div>
</div>
