<div class="main-screen-cnt">
    <div class="header">
        <button routerLink="/search" mat-raised-button color="success">Search for Places</button>
    </div>
    <div class="weather-img-cnt">
        <img class="weather-img" src="../../../assets/img/{{this.weatherData.myWeather?.weather[0].main}}.png" alt="">
        <p class="weather-description">{{this.weatherData.myWeather?.weather[0].description}}</p>
    </div>
    <div class="temperature-cnt">
        <p class="temperature">{{this.roundDecimal(this.weatherData.myWeather?.main.temp)}}°</p>
        <div class="h-t"><span>H: {{this.roundDecimal(this.weatherData.myWeather?.main.temp_max)}}°</span><span class="min-temp">T: {{this.roundDecimal(this.weatherData.myWeather?.main.temp_min)}}°</span></div>
    </div>
    
</div>
